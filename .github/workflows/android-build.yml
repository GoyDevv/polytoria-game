name: Android Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Setup Godot
        run: |
          # Use official Polytoria fork of Godot to fix the missing FoldableContainer bindings causing type load exceptions
          wget -q https://github.com/Polytoria/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_mono_linux_x86_64.zip || true

          if [ -f Godot_v4.6.2-stable_mono_linux_x86_64.zip ]; then
             unzip -q Godot_v4.6.2-stable_mono_linux_x86_64.zip
             chmod +x Godot_v4.6.2-stable_mono_linux_x86_64/Godot_v4.6.2-stable_mono_linux.x86_64
             mv Godot_v4.6.2-stable_mono_linux_x86_64/Godot_v4.6.2-stable_mono_linux.x86_64 ./Godot_v4.6.2-stable_linux.x86_64
             mv Godot_v4.6.2-stable_mono_linux_x86_64/GodotSharp ./GodotSharp
          else
             # Fallback to standard Godot 4.2.2 Mono if custom fork binaries aren't available publicly
             wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_linux_x86_64.zip
             unzip -q Godot_v4.2.2-stable_mono_linux_x86_64.zip
             chmod +x Godot_v4.2.2-stable_mono_linux_x86_64/Godot_v4.2.2-stable_mono_linux.x86_64
             mv Godot_v4.2.2-stable_mono_linux_x86_64/Godot_v4.2.2-stable_mono_linux.x86_64 ./Godot_v4.6.2-stable_linux.x86_64
             mv Godot_v4.2.2-stable_mono_linux_x86_64/GodotSharp ./GodotSharp

             # Workaround for TypeLoadException on custom builds
             # If Godot.FoldableContainer does not exist in standard Godot 4.2.2, we must strip it or disable the plugins trying to use it.
             sed -i 's/"res:\/\/addons\/PolytoriaExportPlugin\/plugin.cfg", //g' Polytoria/project.godot
             sed -i 's/"res:\/\/addons\/PolytoriaExportPlugin\/plugin.cfg"//g' Polytoria/project.godot

             # The CLI headless exporter will also crash when attempting to load custom fonts/themes if editor features are disabled or it runs into autoload missing references on script.
             # Disable all autoloads that break in headless Godot 4.2.2 Mono fallback.
             sed -i '/\[autoload\]/,/\[display\]/{/\[display\]/!d}' Polytoria/project.godot
          fi

          # Fix keystore issue preventing APK installation on actual Android devices
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug" || true

          # Fix Android APK "App not installed as package appears to be invalid" by forcing standard build
          sed -i 's/custom_build\/use_custom_build=true/custom_build\/use_custom_build=false/g' Polytoria/export_presets.cfg
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Cache Android Export Templates
        uses: actions/cache@v3
        with:
          path: ~/.local/share/godot/export_templates
          key: ${{ runner.os }}-godot-export-templates-4.6.2
          restore-keys: |
            ${{ runner.os }}-godot-export-templates-
      - name: Download Precompiled Android Export Templates
        run: |
          if [ ! -d ~/.local/share/godot/export_templates/4.2.2.stable.mono ]; then
             mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable.mono
             wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_mono_export_templates.tpz
             unzip -q Godot_v4.2.2-stable_mono_export_templates.tpz -d temp_templates
             mv temp_templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable.mono/
             rm -rf Godot_v4.2.2-stable_mono_export_templates.tpz temp_templates

             # Also extract the android source template required for custom builds
             unzip -q ~/.local/share/godot/export_templates/4.2.2.stable.mono/android_source.zip -d Polytoria/android/build || true
          fi
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build
        run: |
          mkdir -p build
          dotnet build Polytoria.sln -p:PublishAot=false
          cd Polytoria
          mkdir -p ../build
          ../Godot_v4.6.2-stable_linux.x86_64 --headless --export-release "Android" ../build/polytoria.apk || true
      - uses: actions/upload-artifact@v4
        with:
          name: polytoria-android
          path: build/polytoria.apk
